name: ELWIS Fahrrinnentiefen (Elbe–Oder) aktualisieren

on:
  schedule:
    - cron: '20 5 * * *'   # täglich ~07:20 MESZ
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Playwright installieren
        run: npm i -D playwright@1.48.0 && npx playwright install --with-deps chromium
      - name: ELWIS F/T scrapen
        run: node scripts/scrape_elwis_ft.mjs
      - name: Commit, falls geändert
        run: |
          if ! git diff --quiet -- public/data/ft-de.json; then
            git config user.name "wasserlage-bot"
            git config user.email "bot@wave-bite.com"
            git add public/data/ft-de.json
            git commit -m "data: ELWIS F/T (Elbe-Oder) aktualisiert [skip ci]"
            git push
          else
            echo "Keine Aenderung."
          fi
